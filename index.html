<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eduverse - 3D Interactive Learning</title>
  
  <!-- Global error handler strictly before any modules load -->
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      document.body.innerHTML += '<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(220,38,38,0.95);z-index:999999;display:flex;align-items:center;justify-content:center;color:white;font-family:sans-serif;flex-direction:column;padding:2rem;text-align:center;">' +
        '<h1 style="font-size:3rem;margin-bottom:1rem;font-weight:900;letter-spacing:-1px;">Fatal Runtime Exception</h1>' +
        '<p style="font-size:1.5rem;background:rgba(0,0,0,0.5);padding:1.5rem;border-radius:15px;max-width:800px;font-family:monospace;word-wrap:break-word;">' + (error ? error.message : message) + '</p>' +
        '<p style="margin-top:2rem;opacity:0.8;">Check the browser console or network tab for failed resource requests.</p>' +
        '</div>';
      return false;
    };
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Full Import Map with TWEEN.js added -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "three": "https://esm.sh/three@0.160.0",
        "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.12?external=react,react-dom,three",
        "@react-three/drei": "https://esm.sh/@react-three/drei@9.96.1?external=react,react-dom,three,@react-three/fiber",
        "suspend-react": "https://esm.sh/suspend-react@0.1.3?external=react",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react",
        "framer-motion": "https://esm.sh/framer-motion@11.0.8?external=react,react-dom",
        "@tweenjs/tween.js": "https://esm.sh/@tweenjs/tween.js@23.1.1",
        "htm": "https://esm.sh/htm@3.1.1"
      }
    }
  </script>
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      background-color: #0a0a0a; /* Explicit Dark Space Core Theme */
      color: white; 
      overflow: hidden; 
      font-family: 'Inter', system-ui, -apple-system, sans-serif; 
    }
    #root { width: 100vw; height: 100vh; }
    
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }

    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .glass-card {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.01));
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
    }
    .glass-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 40px 0 rgba(31, 38, 135, 0.4);
      border-color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body class="antialiased">
  <div id="root"></div>

  <script type="module">
    import React, { useState, useRef, useMemo, useEffect, Suspense } from 'react';
    import { createRoot } from 'react-dom/client';
    import * as THREE from 'three';
    import { Canvas, useFrame, useThree } from '@react-three/fiber';
    import { OrbitControls, Stars, Html, Line, Environment } from '@react-three/drei';
    import { Atom, Compass, Globe2, Shapes, RotateCcw, Check, Sparkles, BookOpen, Trophy, Award } from 'lucide-react';
    import { motion, AnimatePresence } from 'framer-motion';
    import * as TWEEN from '@tweenjs/tween.js';
    import htm from 'htm';

    const html = htm.bind(React.createElement);

    /* --- GLOBAL TWEEN UPDATER --- */
    const TweenRoot = () => {
      useFrame(() => {
        TWEEN.update();
      });
      return null;
    };

    /* --- REWARD SYSTEM --- */
    const RewardContext = React.createContext();

    const REWARD_DEFS = [
      { id: 'science_temp', title: 'Thermal Explorer', desc: 'Adjusted the particle temperature', icon: 'Atom', color: '#06b6d4' },
      { id: 'math_solve', title: 'Coordinate Master', desc: 'Solved a Vertex Weaver challenge', icon: 'Shapes', color: '#3b82f6' },
      { id: 'history_visit', title: 'Time Traveler', desc: 'Visited 2 historical landmarks', icon: 'Globe2', color: '#f59e0b' },
      { id: 'language_solve', title: 'Grammar Architect', desc: 'Built a correct sentence', icon: 'BookOpen', color: '#8b5cf6' },
      { id: 'geo_explore', title: 'Plate Tectonician', desc: 'Explored convergent & divergent forces', icon: 'Compass', color: '#10b981' },
    ];

    const useRewards = () => React.useContext(RewardContext);

    const RewardToast = ({ reward, onDone }) => {
      useEffect(() => { const t = setTimeout(onDone, 4000); return () => clearTimeout(t); }, []);
      return html`
        <${motion.div}
          initial=${{ opacity: 0, y: 60, scale: 0.8 }}
          animate=${{ opacity: 1, y: 0, scale: 1 }}
          exit=${{ opacity: 0, y: -30, scale: 0.9 }}
          transition=${{ type: 'spring', damping: 15 }}
          className="fixed bottom-8 right-8 z-[200] glass bg-[#0a0a0a]/90 border border-amber-500/50 rounded-2xl px-8 py-5 flex items-center space-x-5 shadow-[0_0_40px_rgba(245,158,11,0.2)] max-w-md"
        >
          <div className="w-14 h-14 rounded-full bg-gradient-to-br from-yellow-400 to-amber-600 flex items-center justify-center shadow-lg flex-shrink-0">
            <${Trophy} size=${28} className="text-white" />
          </div>
          <div>
            <p className="text-amber-400 font-black text-lg tracking-tight">${reward.title}</p>
            <p className="text-white/60 text-sm font-light">${reward.desc}</p>
          </div>
        <//>
      `;
    };

    const RewardProvider = ({ children }) => {
      const [earned, setEarned] = useState(() => {
        try { return JSON.parse(localStorage.getItem('eduverse_rewards') || '[]'); } catch { return []; }
      });
      const [toastQueue, setToastQueue] = useState([]);

      const grant = (rewardId) => {
        if (earned.includes(rewardId)) return;
        const def = REWARD_DEFS.find(r => r.id === rewardId);
        if (!def) return;
        const next = [...earned, rewardId];
        setEarned(next);
        localStorage.setItem('eduverse_rewards', JSON.stringify(next));
        setToastQueue(q => [...q, def]);
      };

      const dismissToast = () => setToastQueue(q => q.slice(1));

      const reset = () => {
        setEarned([]);
        localStorage.removeItem('eduverse_rewards');
      };

      return html`
        <${RewardContext.Provider} value=${{ earned, grant, reset, REWARD_DEFS }}>
          ${children}
          <${AnimatePresence}>
            ${toastQueue.length > 0 && html`<${RewardToast} key=${toastQueue[0].id} reward=${toastQueue[0]} onDone=${dismissToast} />`}
          <//>
        <//>
      `;
    };

    /* --- REACT ERROR BOUNDARY --- */
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      componentDidCatch(error, errorInfo) { console.error("Eduverse 3D Exception:", error, errorInfo); }
      render() {
        if (this.state.hasError) {
          return html`
            <div className="absolute inset-0 flex items-center justify-center bg-red-900/40 backdrop-blur-md z-[9999]">
              <div className="text-center p-12 bg-black/70 rounded-[2rem] border border-red-500/50 shadow-2xl max-w-lg">
                <div className="w-20 h-20 bg-red-500/20 rounded-full flex items-center justify-center mx-auto mb-6 text-red-500">
                  <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                </div>
                <h1 className="text-4xl font-black text-white mb-4 tracking-tighter">Anomaly Detected</h1>
                <p className="text-red-300 font-mono text-xs p-4 bg-red-950/50 rounded-lg break-words mb-8">${this.state.error.message}</p>
                <button onClick=${() => window.location.reload()} className="px-8 py-4 bg-red-600 hover:bg-red-500 text-white font-bold rounded-full transition-all shadow-[0_0_20px_rgba(220,38,38,0.5)] tracking-widest uppercase">Reboot Subsystem</button>
              </div>
            </div>
          `;
        }
        return this.props.children;
      }
    }

    const GlobalLoader = () => html`
      <${Html} center>
        <div className="flex flex-col items-center">
            <div className="w-16 h-16 border-4 border-[#3b82f6] border-t-transparent rounded-full animate-spin shadow-[0_0_15px_#3b82f6]"></div>
            <p className="mt-6 font-black tracking-widest uppercase text-[#3b82f6] animate-pulse text-sm">Materializing...</p>
        </div>
      <//>
    `;

    /* --- 0. SCIENCE MODULE (PARTICLE SIMULATION) --- */
    const ParticleSimulation = ({ tempMultiplier }) => {
      const COUNT = 500, BOX = 10;
      const meshRef = useRef();
      const initRef = useRef(false);
      const dummy = useMemo(() => new THREE.Object3D(), []);
      const particles = useMemo(() => {
        const arr = [];
        for (let i = 0; i < COUNT; i++) {
          arr.push({
            pos: new THREE.Vector3((Math.random()-.5)*(BOX-1),(Math.random()-.5)*(BOX-1),(Math.random()-.5)*(BOX-1)),
            vel: new THREE.Vector3((Math.random()-.5)*5,(Math.random()-.5)*5,(Math.random()-.5)*5),
            color: new THREE.Color().setHSL(0.55, 0.9, 0.55)
          });
        }
        return arr;
      }, []);

      useFrame((_, delta) => {
        if (!meshRef.current) return;
        const mesh = meshRef.current;
        const dt = Math.min(delta, 0.1) * tempMultiplier * 2;
        const lim = BOX/2 - 0.2;
        for (let i = 0; i < COUNT; i++) {
          const p = particles[i];
          p.pos.addScaledVector(p.vel, dt);
          ['x','y','z'].forEach(a => { if (Math.abs(p.pos[a]) > lim) { p.pos[a] = Math.sign(p.pos[a]) * lim; p.vel[a] *= -1; }});
          const spd = p.vel.length() * tempMultiplier;
          p.color.setHSL(Math.max(0, 0.6 - (spd/20)*0.6), 1, 0.55);
          mesh.setColorAt(i, p.color);
          dummy.position.copy(p.pos); dummy.updateMatrix();
          mesh.setMatrixAt(i, dummy.matrix);
        }
        mesh.instanceMatrix.needsUpdate = true;
        if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;
      });

      return html`
        <instancedMesh ref=${meshRef} args=${[null, null, COUNT]}>
          <sphereGeometry args=${[0.18, 12, 12]} />
          <meshStandardMaterial color="#60a5fa" emissive="#3b82f6" emissiveIntensity=${0.5} roughness=${0.4} />
        </instancedMesh>
      `;
    };

    const ScienceCanvas = () => {
      const [temperature, setTemperature] = useState(1);
      const { grant } = useRewards();
      const handleTempChange = (e) => {
        const val = parseFloat(e.target.value);
        setTemperature(val);
        if (val !== 1) grant('science_temp');
      };
      return html`
        <div className="w-full h-full relative">
          <${Canvas} camera=${{ position: [0, 0, 18], fov: 60 }}>
            <${Suspense} fallback=${html`<${GlobalLoader} />`}>
              <ambientLight intensity=${0.4} />
              <pointLight position=${[15, 15, 15]} intensity=${1.5} />
              <pointLight position=${[-15, -15, -15]} intensity=${0.8} color="#4f46e5" />
              <${OrbitControls} makeDefault enablePan=${false} autoRotate autoRotateSpeed=${0.3} maxDistance=${40} minDistance=${5} />
              <${Stars} radius=${100} depth=${50} count=${4000} factor=${6} saturation=${0} />
              <group>
                <lineSegments>
                  <edgesGeometry args=${[new THREE.BoxGeometry(10, 10, 10)]} />
                  <lineBasicMaterial color="#3b82f6" transparent opacity=${0.4} />
                </lineSegments>
                <${ParticleSimulation} tempMultiplier=${temperature} />
              </group>
            <//>
          <//>
          <div className="absolute bottom-10 left-1/2 -translate-x-1/2 p-[1px] rounded-2xl bg-gradient-to-r from-blue-500/30 to-purple-500/30">
            <div className="glass px-8 py-6 rounded-2xl w-80 md:w-96 flex flex-col items-center">
              <h3 className="font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-300 to-indigo-300 mb-6 uppercase tracking-widest text-sm">System Temperature</h3>
              <input type="range" min="0.1" max="5" step="0.1" value=${temperature} onChange=${handleTempChange}
                className="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:w-6 [&::-webkit-slider-thumb]:h-6 [&::-webkit-slider-thumb]:bg-white [&::-webkit-slider-thumb]:rounded-full [&::-webkit-slider-thumb]:shadow-[0_0_15px_rgba(255,255,255,0.8)]"
                style=${{ background: `linear-gradient(to right, #3b82f6 ${(temperature/5)*100}%, #1e293b ${(temperature/5)*100}%)` }}
              />
              <div className="flex justify-between w-full mt-4 text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                <span className="text-blue-400">Absolute Zero</span><span className="text-rose-500">Plasma</span>
              </div>
            </div>
          </div>
        </div>
      `;
    };

    /* --- 1. MATH MODULE (VERTEX WEAVER) --- */
    const mathChallenges = [
      { q: 'Plot a right triangle with vertices at (0,0,0), (4,0,0), and (0,3,0).', targets: [[0,0,0],[4,0,0],[0,0,3]], tolerance: 0.8 },
      { q: 'Plot a square with corners at (-3,0,-3), (3,0,-3), (3,0,3), (-3,0,3).', targets: [[-3,0,-3],[3,0,-3],[3,0,3],[-3,0,3]], tolerance: 0.8 },
      { q: 'Plot a line segment from (-5,0,0) to (5,0,0).', targets: [[-5,0,0],[5,0,0]], tolerance: 0.8 },
    ];

    const VertexWeaverCanvas = () => {
      const [vertices, setVertices] = useState([]);
      const [challengeIdx, setChallengeIdx] = useState(0);
      const [result, setResult] = useState(null);
      const { grant } = useRewards();
      const challenge = mathChallenges[challengeIdx];
      
      const handleGridClick = (e) => {
        if(vertices.length < 8) {
          e.stopPropagation();
          setVertices([...vertices, Object.values(e.point).map(v => Number(v.toFixed(2)))]);
          setResult(null);
        }
      };

      const checkAnswer = () => {
        const targets = challenge.targets;
        const tol = challenge.tolerance;
        if (vertices.length < targets.length) { setResult('incomplete'); return; }
        let matched = 0;
        targets.forEach(t => {
          if (vertices.some(v => Math.abs(v[0]-t[0]) < tol && Math.abs(v[1]-t[1]) < tol && Math.abs(v[2]-t[2]) < tol)) matched++;
        });
        setResult(matched === targets.length ? 'correct' : 'wrong');
        if (matched === targets.length) grant('math_solve');
      };

      const nextChallenge = () => {
        setChallengeIdx((challengeIdx + 1) % mathChallenges.length);
        setVertices([]);
        setResult(null);
      };

      return html`
        <div className="w-full h-full relative fade-in">
          <${Canvas} camera=${{ position: [0, 8, 12], fov: 50 }}>
            <${Suspense} fallback=${html`<${GlobalLoader} />`}>
              <ambientLight intensity=${0.6} />
              <pointLight position=${[10, 10, 10]} intensity=${1} />
              <${OrbitControls} makeDefault />
              <${Environment} preset="city" />

              <group>
                <mesh rotation=${[-Math.PI / 2, 0, 0]} onPointerDown=${handleGridClick}>
                  <planeGeometry args=${[20, 20]} />
                  <meshStandardMaterial color="#1e293b" transparent=${true} opacity=${0.8} />
                  <gridHelper args=${[20, 20, '#6366f1', '#475569']} rotation=${[Math.PI / 2, 0, 0]} position=${[0, 0, 0.01]} />
                </mesh>

                ${vertices.map((v, i) => html`
                  <mesh key=${i} position=${v}>
                    <sphereGeometry args=${[0.25, 16, 16]} />
                    <meshStandardMaterial color="#3b82f6" emissive="#3b82f6" emissiveIntensity=${0.8} />
                    <${Html} center className="pointer-events-none" position=${[0, 0.6, 0]}>
                      <span className="text-[10px] font-mono bg-black/80 text-blue-300 px-2 py-0.5 rounded-md border border-blue-500/40 whitespace-nowrap">(${v[0]}, ${v[2]})</span>
                    <//>
                  </mesh>
                `)}
                
                ${vertices.length > 1 && html`
                  <${Line} points=${vertices} color="#60a5fa" lineWidth=${4} />
                `}

                <!-- Ghost target markers -->
                ${challenge.targets.map((t, i) => html`
                  <mesh key=${'target-'+i} position=${t}>
                    <sphereGeometry args=${[0.15, 8, 8]} />
                    <meshBasicMaterial color="#fbbf24" transparent opacity=${0.25} wireframe />
                  </mesh>
                `)}
              </group>
            <//>
          <//>

          <!-- Challenge Panel -->
          <div className="absolute top-10 left-1/2 -translate-x-1/2 glass bg-[#0a0a0a]/80 px-8 py-5 rounded-2xl border border-indigo-500/30 max-w-2xl text-center shadow-2xl">
            <p className="text-xs uppercase tracking-widest text-indigo-400 font-bold mb-2">Challenge ${challengeIdx + 1} of ${mathChallenges.length}</p>
            <p className="text-lg font-semibold text-white leading-snug">${challenge.q}</p>
          </div>

          <!-- Right Controls -->
          <div className="absolute top-10 right-10 flex flex-col items-end space-y-3">
             <div className="glass px-5 py-3 rounded-2xl flex items-center space-x-3 border border-blue-500/30">
               <span className="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">${vertices.length} / 8</span>
               <span className="text-xs font-bold text-blue-200 uppercase tracking-widest leading-none">Vertices</span>
             </div>
             <button onClick=${() => { setVertices([]); setResult(null); }} className="glass px-5 py-2.5 rounded-full flex items-center space-x-2 border-white/20 hover:bg-white/10 transition-all font-bold uppercase tracking-widest text-xs">
                <${RotateCcw} size=${14} className="text-blue-400" />
                <span>Reset</span>
             </button>
             <button onClick=${checkAnswer} className="glass px-5 py-2.5 rounded-full flex items-center space-x-2 border border-emerald-500/40 hover:bg-emerald-900/30 transition-all font-bold uppercase tracking-widest text-xs text-emerald-300">
                <${Check} size=${14} />
                <span>Verify</span>
             </button>
             <button onClick=${nextChallenge} className="glass px-5 py-2.5 rounded-full flex items-center space-x-2 border border-amber-500/40 hover:bg-amber-900/30 transition-all font-bold uppercase tracking-widest text-xs text-amber-300">
                <${Sparkles} size=${14} />
                <span>Next Challenge</span>
             </button>
          </div>

          <!-- Result Feedback -->
          ${result === 'correct' && html`<div className="absolute bottom-10 left-1/2 -translate-x-1/2 bg-emerald-950/90 text-emerald-400 font-bold text-xl px-8 py-4 rounded-full border border-emerald-500/50 shadow-[0_0_30px_rgba(16,185,129,0.3)] uppercase tracking-widest flex items-center"><${Check} className="mr-3" size=${24} /> Correct! Well done!</div>`}
          ${result === 'wrong' && html`<div className="absolute bottom-10 left-1/2 -translate-x-1/2 bg-red-950/90 text-red-400 font-bold text-xl px-8 py-4 rounded-full border border-red-500/50 uppercase tracking-widest">Coordinates don't match. Try again!</div>`}
          ${result === 'incomplete' && html`<div className="absolute bottom-10 left-1/2 -translate-x-1/2 bg-amber-950/90 text-amber-400 font-bold text-xl px-8 py-4 rounded-full border border-amber-500/50 uppercase tracking-widest">Place more vertices first!</div>`}
        </div>
      `;
    };

    /* --- 2. HISTORY MODULE (CHRONOS GLOBE) --- */
    const markers = [
      { id: 'rome', name: 'Rome, Italy', title: 'The Colosseum', desc: 'The largest ancient amphitheatre ever built, serving as the epicentre of Roman entertainment.', lat: 41.8902, lng: 12.4922 },
      { id: 'giza', name: 'Giza, Egypt', title: 'Great Pyramid', desc: 'The oldest and largest of the pyramids in the Giza pyramid complex, a testament to ancient structural mastery.', lat: 29.9792, lng: 31.1342 },
      { id: 'machu', name: 'Cusco Region, Peru', title: 'Machu Picchu', desc: 'A 15th-century Inca citadel built flawlessly into the treacherous Eastern Cordillera mountain range.', lat: -13.1631, lng: -72.5450 },
      { id: 'kyoto', name: 'Kyoto, Japan', title: 'Kinkaku-ji', desc: 'The Golden Pavilion, originally a shogun retirement villa, now a Zen Buddhist temple representing ancient culture.', lat: 35.0394, lng: 135.7292 }
    ];

    const latLngToVector3 = (lat, lng, radius) => {
      const phi = (90 - lat) * (Math.PI / 180);
      const theta = (lng + 180) * (Math.PI / 180);
      return new THREE.Vector3(-(radius * Math.sin(phi) * Math.cos(theta)), radius * Math.cos(phi), radius * Math.sin(phi) * Math.sin(theta));
    };

    // Procedural Earth texture via canvas
    const createEarthTexture = () => {
      const canvas = document.createElement('canvas');
      canvas.width = 1024; canvas.height = 512;
      const ctx = canvas.getContext('2d');
      // Ocean
      ctx.fillStyle = '#1a3a5c';
      ctx.fillRect(0, 0, 1024, 512);
      // Simplified continent shapes (rough lat/lng mapped to pixel)
      const toPixel = (lat, lng) => [((lng + 180)/360)*1024, ((90-lat)/180)*512];
      ctx.fillStyle = '#2d6a3f';
      const continents = [
        // North America
        [[50,-130],[55,-60],[30,-80],[25,-100],[35,-120]],
        // South America
        [[-5,-80],[-5,-35],[-50,-70],[-55,-68],[-35,-55]],
        // Europe
        [[60,-10],[60,40],[35,30],[35,-10]],
        // Africa
        [[35,-10],[35,50],[0,45],[-35,30],[-35,15],[5,-15]],
        // Asia
        [[60,40],[60,140],[30,120],[10,105],[25,60],[35,50]],
        // Australia
        [[-12,115],[-12,155],[-40,150],[-35,115]],
        // Antarctica
        [[-65,-180],[-65,180],[-90,180],[-90,-180]],
      ];
      continents.forEach(pts => {
        ctx.beginPath();
        const [sx,sy] = toPixel(pts[0][0], pts[0][1]);
        ctx.moveTo(sx, sy);
        pts.slice(1).forEach(([lat,lng]) => { const [px,py] = toPixel(lat, lng); ctx.lineTo(px, py); });
        ctx.closePath();
        ctx.fill();
      });
      // Add ice caps

    // Earthquake camera shake component
    const EarthquakeShake = ({ intensity }) => {
      const { camera } = useThree();
      const basePos = useRef(null);
      useFrame((state) => {
        if (!basePos.current) basePos.current = camera.position.clone();
        if (intensity > 1) {
          const shake = (intensity - 1) * 0.04;
          camera.position.x = basePos.current.x + (Math.random() - 0.5) * shake;
          camera.position.y = basePos.current.y + (Math.random() - 0.5) * shake;
          camera.position.z = basePos.current.z + (Math.random() - 0.5) * shake * 0.5;
        } else if (basePos.current) {
          camera.position.lerp(basePos.current, 0.1);
        }
      });
      return null;
    };

    const TectonicPlate = ({ isLeft, convergentValue }) => {
      const meshRef = useRef();
      const origRef = useRef(null);

      useFrame((state) => {
        if (!meshRef.current) return;
        const geom = meshRef.current.geometry;
        const posAttr = geom.attributes.position;
        const time = state.clock.elapsedTime;
        
        if (!origRef.current) origRef.current = new Float32Array(posAttr.array);

        let offsetX = 0;
        if (convergentValue < 0) offsetX = isLeft ? convergentValue : -convergentValue;
        
        meshRef.current.position.x = (isLeft ? -5 : 5) + offsetX;

        for (let i = 0; i < posAttr.count; i++) {
            const vx = origRef.current[i*3];
            const vy = origRef.current[i*3 + 1]; 
            const vz = origRef.current[i*3 + 2]; 
            
            let heightOffset = 0;
            if (convergentValue > 0 && vy > 0) {
                const distToBoundary = isLeft ? Math.abs(5 - vx) : Math.abs(-5 - vx);
                if (distToBoundary < 4) {
                     let h = (4 - distToBoundary) * convergentValue * 0.4;
                     h += Math.sin(vz * 3) * 0.5 * (convergentValue/5) * Math.max(0, 2 - distToBoundary);
                     // Earthquake tremor effect near boundary
                     if (convergentValue > 2 && distToBoundary < 2) {
                       h += Math.sin(time * 15 + vz * 5) * 0.15 * convergentValue * (1 - distToBoundary/2);
                     }
                     heightOffset = h;
                }
            }
            posAttr.setY(i, vy + heightOffset);
        }
        posAttr.needsUpdate = true;
        geom.computeVertexNormals();
      });

      return html`

              </group>

          <//>

          <!-- Tectonic Slider UI -->

             </div>

             />
             <p className="text-center mt-6 text-slate-400 text-sm font-light leading-relaxed">Adjust the mantle convection to simulate magma divergence or crustal orogeny (mountain building).</p>

    const modules = [

    /* --- ROOT APP --- */
    const App = () => {
      const [view, setView] = useState('dashboard');

      return html`
        <${RewardProvider}>
          <${ErrorBoundary}>
            <div className="w-full h-full flex flex-col relative overflow-hidden">
              ${view !== 'dashboard' && html`
                <div className="absolute top-8 left-8 z-[100]">
                  <button 
                    onClick=${() => setView('dashboard')}
                    className="group glass bg-[#0a0a0a]/50 px-6 py-3 rounded-full flex items-center space-x-3 hover:bg-white/10 transition-all duration-300 text-xs font-bold uppercase tracking-widest border border-white/20 shadow-[0_4px_30px_rgba(0,0,0,0.5)]"
                  >
                    <svg className="w-5 h-5 text-gray-400 group-hover:text-white transition-colors group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    <span className="text-gray-300 group-hover:text-white transition-colors">Back to Dashboard</span>
                  </button>
                </div>
              `}

              <main className="flex-1 w-full h-full relative">
                ${view === 'dashboard' && html`<${Dashboard} onSelect=${setView} />`}
                ${view === 'science' && html`<${ScienceCanvas} />`}
                ${view === 'math' && html`<${VertexWeaverCanvas} />`}
                ${view === 'history' && html`<${ChronosGlobeCanvas} />`}
                ${view === 'language' && html`<${SyntaxCanvas} />`}
                ${view === 'geo' && html`<${GeographyCanvas} />`}
              </main>
            </div>
          <//>
        <//>
      `;
    };

    const rootElement = document.getElementById('root');
    const root = createRoot(rootElement);
    root.render(html`<${App} />`);
  </script>
</body>
</html>
